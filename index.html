<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7bb302" />
  <link rel="icon" type="image/png"
    href="https://res.cloudinary.com/dvhxc6y0z/image/upload/v1770915535/Artboard_3_1_5_kzzyhs.png" />

  <!-- Preconnect to improve performance -->
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="preconnect" href="https://www.youtube.com" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <!-- Google Tag (gtag.js) - GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap");
  </style>
  <style>
    @import url("https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css");

    * {
      -webkit-font-smoothing: antialiased;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    /* a blue color as a generic focus style */
    button:focus-visible {
      outline: 2px solid #4a90e2 !important;
      outline: -webkit-focus-ring-color auto 5px !important;
    }

    a {
      text-decoration: none;
    }

    /* Global Preloader Styles (Custom Design) */
    .preloaderBg {
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      background: #fff;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
    }

    .preloader-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preloader {
      background: url(https://res.cloudinary.com/dvhxc6y0z/image/upload/v1770915535/Artboard_3_1_5_kzzyhs.png) no-repeat center;
      background-size: 230px;
      width: 300px;
      height: 300px;
      z-index: 1;
    }

    .preloader2 {
      border: 10px solid #f3f3f3;
      border-top: 10px solid #7bb302;
      border-radius: 50%;
      width: 250px;
      height: 250px;
      animation: spin 1s ease-in-out infinite;
      position: absolute;
      top: 25px;
      left: 25px;
      z-index: 2;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .preloader-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
  <link href="tailwind.css" rel="stylesheet" />
</head>

<body>
  <!-- Branded Global Preloader (Custom Design) -->
  <div class="preloaderBg" id="preloader">
    <div class="preloader-container">
      <div class="preloader"></div>
      <div class="preloader2"></div>
    </div>
  </div>

  <div id="app"></div>
  <script type="module" src="./src/index.tsx"></script>
</body>

</html>
